[manager]
cwd = { fg = "#076678" }
hovered = { reversed = true, bold = true }
preview_hovered = { underline = true }
find_keyword = { fg = "#79740e", italic = true }
find_position = { fg = "#af3a03", italic = true }
marker_copied = { fg = "#689d6a", bg = "#689d6a" }
marker_cut = { fg = "#b16286", bg = "#b16286" }
marker_marked = { fg = "#458588", bg = "#458588" }
marker_selected = { fg = "#3c3836", bg = "#3c3836" }
tab_active = { fg = "#fbf1c7", bg = "#7c6f64" }
tab_inactive = { fg = "#7c6f64", bg = "#d5c4a1" }
count_copied = { fg = "#fbf1c7", bg = "#689d6a" }
count_cut = { fg = "#fbf1c7", bg = "#b16286" }
count_selected = { fg = "#fbf1c7", bg = "#3c3836" }
border_symbol = "│"
border_style = { fg = "#a89984" }

[mode]
normal_main = { fg = "#fbf1c7", bg = "#7c6f64", bold = true }
normal_alt = { fg = "#7c6f64", bg = "#d5c4a1" }
select_main = { fg = "#fbf1c7", bg = "#af3a03", bold = true }
select_alt = { fg = "#7c6f64", bg = "#d5c4a1" }
unset_main = { fg = "#fbf1c7", bg = "#79740e", bold = true }
unset_alt = { fg = "#7c6f64", bg = "#d5c4a1" }

[status]
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
overall = {}
progress_label = { fg = "#3c3836", bold = true }
progress_normal = { fg = "#d5c4a1", bg = "#ebdbb2" }
progress_error = { fg = "#cc241d", bg = "#ebdbb2" }
perm_type = { fg = "#d5c4a1" }
perm_read = { fg = "#79740e" }
perm_write = { fg = "#cc241d" }
perm_exec = { fg = "#79740e" }
perm_sep = { fg = "#a89984" }

[pick]
border = { fg = "#076678" }
active = { fg = "#8f3f71", bold = true }
inactive = {}

[input]
border = { fg = "#3c3836" }
title = {}
value = {}
selected = { reversed = true }

[tasks]
border = { fg = "#d5c4a1" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#ebdbb2" }
cand = { fg = "#076678" }
rest = { fg = "#928374" }
desc = { fg = "#af3a03" }
separator = "  "
separator_style = { fg = "#d5c4a1" }

[help]
on = { fg = "#076678" }
run = { fg = "#8f3f71" }
hovered = { reversed = true, bold = true }
footer = { fg = "#fbf1c7", bg = "#7c6f64" }

[notify]
title_info = { fg = "#689d6a" }
title_warn = { fg = "#d79921" }
title_error = { fg = "#cc241d" }

[filetype]
rules = [
    { mime = "image/*", fg = "#8f3f71" },
    { mime = "{audio,video}/*", fg = "#d79921" },
    { mime = "application/*zip", fg = "#cc241d" },
    { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#cc241d" },
    { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#427b58" },
    { url = "*/", fg = "#076678" },
    { url = "*", fg = "#3c3836" },
]

[confirm]
border = { fg = "#7c6f64" }
title = { fg = "#076678" }
content = { fg = "#af3a03" }
body = { fg = "red" }
list = { fg = "#3c3836" }
btn_yes = { reversed = true, fg = "#3c3836" }
btn_no = {}
btn_labels = ["  [Y]es  ", "  (N)o  "]

[cmp]
border = { fg = "#7c6f64" }
active = { reversed = true, fg = "#076678" }
inactive = { fg = "#3c3836" }
